# ByteTrack — good balance of speed and accuracy
# Uses two-stage matching (high + low confidence detections)

tracker_type: bytetrack
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 20
match_thresh: 0.8
fuse_score: True

# Frame skipping — run OBB detector every Nth frame, redraw cached boxes otherwise
detect_every_n: 2
