# BoT-SORT — most accurate, heaviest
# Adds camera motion compensation on top of ByteTrack

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 15
match_thresh: 0.8
fuse_score: True
gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: False

# Frame skipping — run OBB detector every Nth frame, redraw cached boxes otherwise
detect_every_n: 2
